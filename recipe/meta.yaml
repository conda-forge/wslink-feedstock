{% set version = "2.5.4" %}

package:
  name: wslink
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wslink/wslink-{{ version }}.tar.gz
  sha256: d24d7bcefd998a760ed39eb6114b4c2e379ebdc124e5bf05fac2d0a1a8f8e0e0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - aiohttp <4
    - msgpack-python >=1,<2

test:
  imports:
    - wslink
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/kitware/wslink
  summary: Python/JavaScript library for communicating over WebSocket
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - banesullivan
    - jourdain
    - kwrobot
